name: Bond
kind: company
description: >-
  Bond Financial Technologies was an embedded-finance platform that offered
  APIs for card issuing (Bond Issuing), money movement (Bond Pay), deposit
  accounts (Bond Banking), and credit underwriting (Bond Credit) to brands
  and fintechs. Bond was acquired by FIS (Fidelity National Information
  Services) in 2023 and its product surface has been folded into Atelio by
  FIS at atelio.com. The original Bond developer portal and API surface at
  bond.tech is no longer the primary access path; new partners are routed to
  the Atelio platform. This is an honest historical record.
